name: '🚀 Publish Plugin'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install JPRM
        run: python -m pip install --upgrade jprm

      - name: Build plugin zip
        id: build
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          version="${tag#v}"
          mkdir -p ./artifacts
          zipfile=$(jprm --verbosity=debug plugin build . --version "$version" --output ./artifacts --dotnet-configuration Release --dotnet-framework net9.0)
          echo "zipfile=$zipfile" >> "$GITHUB_OUTPUT"
          echo "Built artifact: $zipfile"

      - name: Attach zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: ${{ steps.build.outputs.zipfile }}

      - name: Update manifest.json
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          git fetch origin master
          git checkout master
          base="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}"
          jprm repo add --url "$base" ./manifest.json "${{ steps.build.outputs.zipfile }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Update manifest for ${TAG_NAME}"
          git push origin master
